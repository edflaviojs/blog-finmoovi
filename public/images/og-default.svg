<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect x="30" y="30" width="1140" height="570" rx="20" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#A91079"/>
    </linearGradient>
  </defs>
  <!-- Large centered logo mark -->
  <circle cx="600" cy="260" r="80" fill="none" stroke="url(#logoGrad)" stroke-width="4"/>
  <path d="M570 260 L590 240 L610 270 L630 230" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Brand name -->
  <text x="600" y="380" font-family="Inter, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#f0f6fc" text-anchor="middle">FinMoovi</text>
  <text x="600" y="420" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Finanças pessoais com inteligência</text>
  <!-- Decorative elements -->
  <circle cx="200" cy="500" r="60" fill="#00F0FF" opacity="0.03"/>
  <circle cx="1000" cy="150" r="80" fill="#A91079" opacity="0.03"/>
  <!-- Bottom bar -->
  <rect x="400" y="480" width="400" height="3" rx="1.5" fill="url(#logoGrad)" opacity="0.5"/>
</svg>