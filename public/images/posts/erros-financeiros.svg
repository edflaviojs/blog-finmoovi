<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <defs>
    <linearGradient id="errGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#A91079"/>
    </linearGradient>
  </defs>
  <!-- Warning icons -->
  <g transform="translate(140, 180)">
    <circle cx="40" cy="40" r="36" fill="rgba(248,81,73,0.1)" stroke="#f85149" stroke-width="1.5"/>
    <text x="40" y="48" font-family="Inter, sans-serif" font-size="24" fill="#f85149" text-anchor="middle">1</text>
    <text x="90" y="35" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc">Sem reserva de emergência</text>
    <text x="90" y="55" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">Viver sem colchão financeiro</text>
  </g>
  <g transform="translate(140, 270)">
    <circle cx="40" cy="40" r="36" fill="rgba(248,81,73,0.1)" stroke="#f85149" stroke-width="1.5"/>
    <text x="40" y="48" font-family="Inter, sans-serif" font-size="24" fill="#f85149" text-anchor="middle">2</text>
    <text x="90" y="35" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc">Gastar mais do que ganha</text>
    <text x="90" y="55" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">Cartão como extensão da renda</text>
  </g>
  <g transform="translate(140, 360)">
    <circle cx="40" cy="40" r="36" fill="rgba(248,81,73,0.1)" stroke="#f85149" stroke-width="1.5"/>
    <text x="40" y="48" font-family="Inter, sans-serif" font-size="24" fill="#f85149" text-anchor="middle">3</text>
    <text x="90" y="35" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc">Não acompanhar gastos</text>
    <text x="90" y="55" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">Dinheiro some sem explicação</text>
  </g>
  <!-- Right side: more errors -->
  <g transform="translate(600, 180)">
    <circle cx="40" cy="40" r="36" fill="rgba(248,81,73,0.1)" stroke="#f85149" stroke-width="1.5"/>
    <text x="40" y="48" font-family="Inter, sans-serif" font-size="24" fill="#f85149" text-anchor="middle">4</text>
    <text x="90" y="35" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc">Ignorar gastos pequenos</text>
    <text x="90" y="55" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">R$15 aqui, R$20 ali...</text>
  </g>
  <g transform="translate(600, 270)">
    <circle cx="40" cy="40" r="36" fill="rgba(248,81,73,0.1)" stroke="#f85149" stroke-width="1.5"/>
    <text x="40" y="48" font-family="Inter, sans-serif" font-size="24" fill="#f85149" text-anchor="middle">5</text>
    <text x="90" y="35" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc">Sem objetivos financeiros</text>
    <text x="90" y="55" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">Economizar sem meta clara</text>
  </g>
  <g transform="translate(600, 360)">
    <circle cx="40" cy="40" r="36" fill="rgba(248,81,73,0.1)" stroke="#f85149" stroke-width="1.5"/>
    <text x="40" y="48" font-family="Inter, sans-serif" font-size="24" fill="#f85149" text-anchor="middle">6</text>
    <text x="90" y="35" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f0f6fc">Investir sem entender</text>
    <text x="90" y="55" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">Seguir a manada financeira</text>
  </g>
  <!-- Title -->
  <text x="140" y="110" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#f0f6fc">7 Erros Financeiros</text>
  <text x="140" y="145" font-family="Inter, sans-serif" font-size="20" fill="#8b949e">Que todo iniciante comete (e como evitar)</text>
  <!-- Bottom bar -->
  <rect x="140" y="480" width="920" height="4" rx="2" fill="#21262d"/>
  <rect x="140" y="480" width="600" height="4" rx="2" fill="url(#errGrad)"/>
  <text x="140" y="520" font-family="Inter, sans-serif" font-size="13" fill="#8b949e">Progresso: evite esses erros e economize até R$ 15.000/ano</text>
</svg>
