<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="140" y1="500" x2="1060" y2="500" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="400" x2="1060" y2="400" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="300" x2="1060" y2="300" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="200" x2="1060" y2="200" stroke="#21262d" stroke-width="1"/>
  <!-- Chart line -->
  <defs>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#A91079"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Area fill -->
  <path d="M140 450 L280 380 L420 420 L560 280 L700 320 L840 200 L980 240 L1060 180 L1060 500 L140 500 Z" fill="url(#areaGrad)"/>
  <!-- Line -->
  <path d="M140 450 L280 380 L420 420 L560 280 L700 320 L840 200 L980 240 L1060 180" stroke="url(#chartGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Dots -->
  <circle cx="560" cy="280" r="6" fill="#00F0FF"/>
  <circle cx="840" cy="200" r="6" fill="#A91079"/>
  <circle cx="1060" cy="180" r="6" fill="#A91079"/>
  <!-- Title -->
  <text x="140" y="120" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#f0f6fc">Como Criar um Orçamento Pessoal</text>
  <text x="140" y="160" font-family="Inter, sans-serif" font-size="20" fill="#8b949e">5 passos simples para organizar suas finanças</text>
  <!-- Badge -->
  <rect x="140" y="520" width="100" height="28" rx="14" fill="rgba(0,240,255,0.1)"/>
  <text x="160" y="539" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#00F0FF">Orçamento</text>
</svg>
