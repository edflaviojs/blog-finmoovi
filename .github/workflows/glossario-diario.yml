name: Glossário Diário Automático

on:
  schedule:
    # Diariamente às 8h BRT (11h UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      letra:
        description: 'Letra específica para gerar (A-Z)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  gerar-glossario:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "FinMoovi Bot"
          git config user.email "bot@finmoovi.com"

      - name: Install dependencies
        run: npm ci

      - name: Gerar glossário diário
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.letra }}" ]; then
            if [[ "${{ github.event.inputs.letra }}" =~ ^[A-Z]$ ]]; then
              echo "${{ github.event.inputs.letra }}" > .current-letter
            else
              echo "Letra inválida: ${{ github.event.inputs.letra }}"
              exit 1
            fi
          fi
          node src/scripts/automacoes/glossario-auto-diario.js

      - name: Push changes
        if: success()
        run: |
          git pull --rebase origin main || true
          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push
          else
            echo "No changes to push"
          fi
