name: Year Refresh (anos defasados em títulos)

on:
  schedule:
    # Mensal, dia 1 às 07:15 UTC — na virada do ano (01/jan) faz o grosso;
    # nos outros meses funciona como rede de segurança.
    - cron: '15 7 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  year-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "${{ vars.BOT_NAME || 'FinMoovi Bot' }}"
          git config user.email "${{ vars.BOT_EMAIL || 'bot@finmoovi.com' }}"

      - name: Refresh de anos em títulos/descrições
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node --import tsx src/scripts/validacao/refresh-anos.js

      - name: Commit and push changes
        run: |
          git add src/content/posts src/content/glossario
          git diff --staged --quiet || git commit -m "chore: refresh anual de anos em títulos"
          git pull --rebase origin main || true
          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push
          else
            echo "No changes to push"
          fi
