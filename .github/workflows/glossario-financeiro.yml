name: Glossário Financeiro

on:
  schedule:
    # 3x/semana: terça, quinta, sábado às 4h (UTC-3 = 7h UTC)
    - cron: '0 7 * * 2,4,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-glossario:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "FinMoovi Bot"
          git config user.email "bot@finmoovi.com"

      - name: Install dependencies
        run: npm ci

      - name: Gerar termo do glossário
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
        run: node src/scripts/automacoes/glossario-auto.js

      - name: Push changes
        run: |
          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push
          else
            echo "No changes to push"
          fi
