name: Relatório Semanal de Analytics

on:
  schedule:
    # Segundas às 8h BRT (11h UTC)
    - cron: '0 11 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "FinMoovi Bot"
          git config user.email "bot@finmoovi.com"

      - name: Gerar relatório semanal
        env:
          CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: node src/scripts/automacoes/analytics-report.js

      - name: Push changes
        run: |
          git pull --rebase origin main || true
          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push
          else
            echo "No changes to push"
          fi
