name: Keywords Manuais - Sincronizar Fila

on:
  push:
    branches: [main]
    paths:
      - 'data/keywords-manuais.csv'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  sincronizar-fila:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "${{ vars.BOT_NAME || 'FinMoovi Bot' }}"
          git config user.email "${{ vars.BOT_EMAIL || 'bot@finmoovi.com' }}"

      - name: Sincronizar fila de keywords
        run: node src/scripts/automacoes/keyword-queue-sync.js

      - name: Commit e push
        run: |
          git add .github/data/keyword-queue.json press/keyword-queue.md
          if git diff --cached --quiet; then
            echo "Sem alteração na fila de keywords"
          else
            git commit -m "chore: sincronizar fila de keywords [bot]"
            git pull --rebase origin main || true
            git push
          fi
