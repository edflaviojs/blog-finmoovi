name: Gerar Arte Sazonal (candidatos p/ aprovação)

on:
  schedule:
    # Segundas às 8h UTC — olha os eventos sazonais dos próximos 45 dias
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gerar-arte:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "${{ vars.BOT_NAME || 'FinMoovi Bot' }}"
          git config user.email "${{ vars.BOT_EMAIL || 'bot@finmoovi.com' }}"

      - name: Install dependencies
        run: npm ci

      - name: Gerar candidatos de arte sazonal
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
        run: node --import tsx src/scripts/automacoes/gerar-arte-sazonal.js

      - name: Commit candidatos (se houver)
        id: commit
        run: |
          # A pasta só existe quando o script gera candidatos; nas semanas sem
          # evento sazonal na janela ela não existe e `git add` num caminho
          # inexistente aborta (exit 128). Só adiciona se a pasta existir.
          if [ -d public/images/sazonal ]; then
            git add public/images/sazonal
          fi
          if git diff --cached --quiet; then
            echo "Sem candidatos novos"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            # skip do CI: as imagens não são usadas até a aprovação humana no config
            git commit -m "arte sazonal: candidatos para aprovacao [skip ci]"
            git pull --rebase origin main || true
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # Aviso ATIVO para o dono: issue no GitHub com as imagens embutidas →
      # o GitHub manda a notificação por e-mail automaticamente
      - name: Abrir issue de aprovação
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(git show --name-only --pretty=format: HEAD | grep '^public/images/sazonal/' || true)
          {
            echo "O workflow gerou candidatos de arte para os próximos eventos sazonais."
            echo ""
            echo "**Para aprovar um candidato:** defina no evento correspondente em \`site.config.ts\`:"
            echo '```'
            echo "art: '/images/sazonal/<arquivo>.webp'"
            echo '```'
            echo "(ou peça ao Claude: \"aprova o candidato N do <evento>\")."
            echo "Sem aprovação, o slide continua usando o tema CSS — nada muda no site."
            echo ""
            for f in $files; do
              echo "### ${f#public/images/sazonal/}"
              echo "![candidato](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/raw/main/$f)"
              echo ""
            done
          } > /tmp/issue-body.md
          gh issue create \
            --title "🎨 Arte sazonal: candidatos aguardando sua aprovação" \
            --body-file /tmp/issue-body.md
