name: Gerar ALT descritivo das imagens (IA de visão)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Máximo de imagens a processar (vazio = todas). Use 5 para testar.'
        required: false
        default: ''
      force:
        description: 'Regenerar mesmo onde já existe imageAlt (true/false)'
        required: false
        default: 'false'
  # Rede de segurança: 3x/dia processa um lote (60) até tudo ter imageAlt; depois vira no-op.
  schedule:
    - cron: '0 9,15,21 * * *'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gerar-alt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "${{ vars.BOT_NAME || 'FinMoovi Bot' }}"
          git config user.email "${{ vars.BOT_EMAIL || 'bot@finmoovi.com' }}"

      - name: Install dependencies
        run: npm ci

      - name: Gerar imageAlt via IA de visão
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          # Rodadas agendadas processam um lote de 60 (respeita limites de API)
          if [ -z "$LIMIT" ] && [ "${{ github.event_name }}" = "schedule" ]; then LIMIT="60"; fi
          ARGS=""
          if [ -n "$LIMIT" ]; then ARGS="--limit $LIMIT"; fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          node --import tsx src/scripts/automacoes/gerar-alt-imagens.js $ARGS

      - name: Commit e push
        run: |
          git add src/content/posts src/content/glossario
          if git diff --cached --quiet; then
            echo "Nenhum imageAlt novo para commitar"
          else
            git commit -m "content(a11y): gerar imageAlt descritivo das capas via IA de visão"
            git pull --rebase origin main || true
            git push
          fi
