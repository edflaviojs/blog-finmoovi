name: Sweep de Traduções (lang-guard)

on:
  schedule:
    # Semanal: segunda-feira às 5h UTC
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "${{ vars.BOT_NAME || 'FinMoovi Bot' }}"
          git config user.email "${{ vars.BOT_EMAIL || 'bot@finmoovi.com' }}"

      - name: Install dependencies
        run: npm ci

      - name: Varrer e re-traduzir corpos EN/ES em idioma errado
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
        run: node src/scripts/automacoes/traducao-sweep.js
        timeout-minutes: 60

      - name: Commit and push
        run: |
          git add src/content/posts/ src/content/glossario/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "i18n: sweep de traduções — re-tradução de corpos em idioma errado [auto]"
            git pull --rebase origin main || true
            git push
          fi
