name: Community Monitor

on:
  schedule:
    - cron: '0 7 * * *' # Daily at 7h UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm ci

      - name: Ensure data directory exists
        run: mkdir -p .github/data

      - name: Run Reddit Opportunities Monitor
        run: node scripts/reddit-opportunities.js

      - name: Run Google Alerts Monitor
        run: node scripts/google-alerts-monitor.js

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/data/reddit-opportunities.json .github/data/google-alerts-results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update community monitor data [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
