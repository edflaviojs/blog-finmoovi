name: Broken Link Building

on:
  schedule:
    - cron: '0 4 * * 0' # Domingos às 4h UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  broken-link-finder:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Broken Link Finder
        run: node --import tsx scripts/broken-link-finder.js
        env:
          NODE_OPTIONS: '--no-warnings'

      - name: Run Outreach Email Generator
        run: node --import tsx scripts/generate-outreach-emails.js
        env:
          NODE_OPTIONS: '--no-warnings'

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/data/broken-links-opportunities.json
          git add .github/data/outreach-drafts.json
          git diff --staged --quiet || git commit -m "chore: update broken link opportunities [skip ci]"
          git push
