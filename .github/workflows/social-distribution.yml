name: Social Distribution (Pinterest + Bookmarks)

on:
  schedule:
    # Segundas, quartas e sextas às 15h UTC
    - cron: '0 15 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write
  # Lembrete automático de renovação do refresh token do Pinterest (issue → e-mail)
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  social-distribution:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run Pinterest Publish
        env:
          # Preferencial: refresh token (access token renovado a cada execução)
          PINTEREST_CLIENT_ID: ${{ secrets.PINTEREST_CLIENT_ID }}
          PINTEREST_CLIENT_SECRET: ${{ secrets.PINTEREST_CLIENT_SECRET }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          # Fallback legado (token estático, expira em ~30 dias)
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          # Para abrir a issue de lembrete de renovação do token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Descrição rica do pin via LLM (kie-ai.js): Cerebras → Groq → Cloudflare
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
        run: node --import tsx scripts/pinterest-publish.js

      - name: Run Social Bookmarking
        env:
          RAINDROP_ACCESS_TOKEN: ${{ secrets.RAINDROP_ACCESS_TOKEN }}
          RAINDROP_COLLECTION_ID: ${{ secrets.RAINDROP_COLLECTION_ID }}
        run: node --import tsx scripts/social-bookmarking.js

      - name: Commit and push tracking updates
        run: |
          git config user.name "FinMoovi Bot"
          git config user.email "bot@finmoovi.com"
          git add .github/data/pinterest-published.json .github/data/social-bookmarks.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update social distribution tracking [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
