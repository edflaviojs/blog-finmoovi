name: Welcome Email Sequence

on:
  schedule:
    # Diariamente às 9h BRT (12h UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  welcome-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Send welcome sequence emails
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node src/scripts/automacoes/welcome-sequence.js
