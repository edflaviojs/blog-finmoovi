name: Gerar Conteúdo Social

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gerar-social:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "${{ vars.BOT_NAME || 'FinMoovi Bot' }}"
          git config user.email "${{ vars.BOT_EMAIL || 'bot@finmoovi.com' }}"

      - name: Install dependencies
        run: npm ci

      - name: Gerar conteúdo para redes sociais
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
        run: node src/scripts/automacoes/gerar-social.js

      - name: Run auto-schema on new posts
        run: node src/scripts/automacoes/auto-schema.js

      - name: Run internal linking
        run: node src/scripts/automacoes/internal-linking.js

      - name: Push changes
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto social + schema + internal links"
          git pull --rebase origin main || true
          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push
          else
            echo "No changes to push"
          fi
