name: IndexNow (indexação instantânea Bing/Copilot)

on:
  schedule:
    - cron: '0 */6 * * *' # a cada 6 horas
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  indexnow:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm ci

      - name: Notificar IndexNow (URLs novas do sitemap)
        run: node scripts/notify-indexnow.js

      - name: Commit tracking
        run: |
          git config user.name "FinMoovi Bot"
          git config user.email "bot@finmoovi.com"
          git add .github/data/indexnow-submitted.json
          if git diff --staged --quiet; then
            echo "Sem mudanças no tracking."
          else
            git commit -m "chore: atualizar tracking IndexNow [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
