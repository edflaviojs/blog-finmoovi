name: Auto Update Posts Antigos

on:
  schedule:
    # Dia 1 de cada mês às 6h BRT (9h UTC)
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "${{ vars.BOT_NAME || 'FinMoovi Bot' }}"
          git config user.email "${{ vars.BOT_EMAIL || 'bot@finmoovi.com' }}"

      - name: Atualizar posts antigos
        run: node src/scripts/automacoes/auto-update-posts.js

      - name: Run auto-schema
        run: node src/scripts/automacoes/auto-schema.js

      - name: Run internal linking
        run: node src/scripts/automacoes/internal-linking.js

      - name: Auto-sincronizar i18n (rede de segurança)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: node src/scripts/validacao/sincronizar-i18n.js --no-validate

      - name: Validar consistência i18n
        run: node src/scripts/validacao/validar-i18n.js

      - name: Commit and push remaining changes
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "chore: monthly maintenance — schema + links + freshness"
          git pull --rebase origin main || true
          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push
          else
            echo "No changes to push"
          fi
