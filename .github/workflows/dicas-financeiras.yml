name: Gerar Dicas Financeiras

on:
  schedule:
    # Diariamente às 6h BRT (9h UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "FinMoovi Bot"
          git config user.email "bot@finmoovi.com"

      - name: Install dependencies
        run: npm ci

      - name: Gerar post de dica financeira
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
        run: node src/scripts/automacoes/gerar-dicas-financeiras.js

      - name: Push changes
        run: |
          git pull --rebase origin main || true
          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push
          else
            echo "No changes to push"
          fi
