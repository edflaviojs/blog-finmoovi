name: GSC - Canibalizacao por query

on:
  schedule:
    # Sexta 07h UTC. Semanal.
    - cron: '0 7 * * 5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  canibalizacao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "${{ vars.BOT_NAME || 'FinMoovi Bot' }}"
          git config user.email "${{ vars.BOT_EMAIL || 'bot@finmoovi.com' }}"

      - name: Install dependencies
        run: npm ci

      - name: Detectar e consolidar canibalização
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ vars.GSC_SITE_URL || 'https://blog.finmoovi.com/' }}
        run: node src/scripts/automacoes/gsc-canibalizacao.js

      - name: Validar consistência i18n
        run: node src/scripts/validacao/validar-i18n.js

      - name: Push changes
        run: |
          git pull --rebase origin main || true
          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push
          else
            echo "No changes to push"
          fi
